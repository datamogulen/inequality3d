<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<title>Om modellen – Ojämlikhet i 3D</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index,follow">
<style>
  :root { --bg:#f7f5f0; --panel:#fff; --ink:#26241f; --ink2:#6b675e; --line:#e4e0d6; --accent:#2a78d6; }
  * { box-sizing: border-box; }
  body { font: 16px/1.55 -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
         color: var(--ink); background: var(--bg); margin: 0; padding: 0 16px 60px; }
  main { max-width: 720px; margin: 0 auto; }
  header { display:flex; justify-content: space-between; align-items: baseline; gap: 10px;
           padding: 18px 0 6px; flex-wrap: wrap; }
  h1 { font-size: 26px; margin: 0; }
  h2 { font-size: 19px; margin: 26px 0 8px; }
  .sub { color: var(--ink2); }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
          padding: 14px 18px; margin: 14px 0; }
  table { border-collapse: collapse; width: 100%; }
  td, th { text-align: left; padding: 5px 10px 5px 0; border-bottom: 1px dashed var(--line); }
  td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  .btn { font: inherit; font-size: 13px; padding: 4px 11px; border: 1px solid var(--line);
         border-radius: 7px; background: var(--bg); color: var(--ink); cursor: pointer; }
  a { color: var(--accent); }
  .pill { display:inline-block; background:var(--bg); border:1px solid var(--line);
          border-radius: 999px; padding: 1px 10px; font-size: 13px; margin: 0 4px 4px 0; }
  .note { font-size: 14px; color: var(--ink2); }
  details { margin: 10px 0; border-bottom: 1px dashed var(--line); padding-bottom: 8px; }
  summary { cursor: pointer; font-weight: 600; }
  details > div { padding: 8px 0 2px; }
  #err { color: #a33; }
</style>
</head>
<body>
<main>
  <header>
    <h1 id="title">…</h1>
    <button class="btn" id="langBtn">English</button>
  </header>
  <div class="sub" id="subtitle"></div>
  <div id="err"></div>

  <div class="card" id="statsCard" style="display:none">
    <h2 id="statsH" style="margin-top:0"></h2>
    <table id="stats"></table>
    <p class="note" id="statsNote"></p>
  </div>

  <div class="card" id="compCard" style="display:none">
    <h2 id="compH" style="margin-top:0"></h2>
    <table id="comp"></table>
    <p class="note" id="compNote"></p>
  </div>

  <div id="method"></div>

  <div class="card" id="faqCard" style="display:none">
    <h2 id="faqH" style="margin-top:0"></h2>
    <div id="faq"></div>
  </div>

  <div class="card">
    <h2 id="srcH" style="margin-top:0"></h2>
    <ul id="sources"></ul>
  </div>

  <p><a id="appLink" href="./">→</a></p>
</main>

        ["Hur hanteras negativa förmögenheter (skulder)?",
         `<p>WID har percentildata även för negativa nettoförmögenheter – i många länder,

<p>Medelvärdet (det mörka vågräta strecket) är alltid <b>netto</b>: skulderna är medräknade

      carbon: [
        ["Dubbelräknas inte investeringarna? Fabriken gör ju varor som konsumeras senare",
         `<p>Nej. Bokföringen görs år för år: varje års faktiska utsläpp delas upp exakt en

slutanvändning i nationalräkenskaperna, inte en insatsvara som skrivs av in i framtida

aktörer – i kontrast till livscykelanalyser, där dubbelräkningsproblemet är ständigt

<p>Det finns en alternativ bokföring (”kapitalendogenisering”) där fabriksbygget i stället

        ["Ingår vägen, lastbilen och järnvägen i en varas avtryck?",

    method: {
      income: `<h2>Vad modellen visar</h2>
<p>Varje stapel är genomsnittsinkomsten i en percentil av den vuxna befolkningen,
sorterad från lägst (percentil 1) till högst (percentil 100), med finare upplösning i
toppen. Måttet är <b>nationalinkomst före skatt per vuxen</b> från World Inequality

luften under det – hyvlar man av topparna och fyller dalarna blir remsan platt på

<i>inkomstsumman</i> i två lika halvor: befolkningen till vänster har tillsammans lika

<p>I 3D-utskriften är höjdskalan fast (t.ex. 1 mm = 5 000 USD, står i botten), så

utveckling. Toppen (rikaste 1 %) visas som gruppens viktade genomsnitt för att modellen
ska gå att skriva ut – annars vore den meterhög.</p>`,
      wealth: `<h2>Vad modellen visar</h2>
<p>Varje stapel är genomsnittlig <b>nettoförmögenhet per vuxen</b> (tillgångar minus
skulder) i en percentil, från lägst till högst, från World Inequality Database.
De lägsta percentilerna är ofta <i>negativa</i> (skulder överstiger tillgångarna) –

<p>Förmögenhet är mycket ojämnare fördelad än inkomst: medianen är ofta bara en bråkdel

<p>Varje stapel är det genomsnittliga <b>växthusgasavtrycket per person</b> (ton CO₂e/år)
i en percentil, sorterat från lägst till högst avtryck. Datat är Lucas Chancels
fördelningar (WID), som kombinerar nationalräkenskaper, miljö-input-output-tabeller

<p><b>1. Privat konsumtion</b> – fördelas efter inkomst med landsspecifik elasticitet.<br>
<b>2. Offentlig konsumtion</b> – fördelas lika per person (klumpsumma) i huvudscenariot;

<b>3. Investeringar</b> – utsläpp från kapitalbildning (hela bruttoinvesteringen,
alltså <i>både privata och offentliga</i> investeringar – samma avgränsning som t.ex.

den som äger x % av kapitalet tillskrivs x % av investeringsutsläppen. Det är denna

<p>Det mörka vågräta strecket ligger på medelavtryckets höjd; det vita lodräta strecket
delar de totala utsläppen i två lika halvor – hälften av landets konsumtionsutsläpp kommer

I 3D-utskriften är skalan fast (1 mm = 1 ton CO₂e/år).</p>`,

  en: {

    faq: {
      wealth: [
        ["How is negative wealth (debt) handled?",
         `<p>WID has percentile data for negative net wealth too – in many countries,
including Sweden, the bottom 20–30 percent are net debtors (debts exceed assets, often
student loans and early-life mortgages). By default the bars are floored at zero in the
model; the <i>Show debt</i> option in the app raises the zero plane and shows debt as a
separate red layer hanging down from it, deepest at percentile 1 – printable as its own
STL in red.</p>
<p>The mean (the dark horizontal stripe) is always <b>net</b>: debts are included and pull
it down. That is the standard definition of mean wealth – excluding debts would measure
gross wealth, a different concept. The white 50/50 mark, by contrast, splits the
<i>positive</i> wealth sum into two halves (a debt cannot be "half-owned").</p>`],

      carbon: [
        ["Isn't investment double-counted? The factory makes goods that are consumed later",
         `<p>No. The accounting is done year by year: each year's actual emissions are
partitioned exactly once between private consumption, public consumption and investments.
When the factory is built in 2019, the construction emissions (cement, steel, energy) land
in <i>investments 2019</i>. When the factory makes shoes in 2024, the <i>operating</i>
emissions of that year (electricity, materials, transport) are embodied in the shoes'
footprint – but no share of the factory build itself. Capital formation is final demand in
the national accounts, not an input amortised into future products. As Chancel puts it:
the same tonne of carbon can never be attributed to two different agents – in contrast to
life-cycle analysis, where the double-counting problem is ever-present.</p>
<p>There is an alternative convention ("capital endogenisation") where the factory build is
instead amortised into product footprints over the capital's lifetime – but then the
investment category must be dropped, or you would indeed double-count. The two conventions
are each internally consistent and must not be mixed.</p>`],
        ["Are the road, the truck and the railway included in a product's footprint?",

<tr><td>Public road/rail maintenance</td><td>public consumption</td></tr>
<tr><td>Manufacturing the truck/train/aircraft</td><td>investments</td></tr>
<tr><td>Diesel, traction power, jet fuel, fleet servicing (by firms)</td><td>the product's footprint</td></tr>
</table>
<p>Two subtleties: households' <i>private cars</i> count as consumption – manufacturing
lands in the buyer's footprint in the purchase year – while a haulier's identical truck is
an investment; the line is drawn by who buys, not what. And <i>housing construction</i> is
always investment, even for private individuals. The consequence: investments are the
single largest emissions category in Sweden (about 27% in 2023 according to the Swedish

    method: {
      income: `<h2>What the model shows</h2>
<p>Each bar is the average income of one percentile of the adult population, sorted from
lowest (percentile 1) to highest (percentile 100), with finer resolution at the top. The
measure is <b>pre-tax national income per adult</b> from the World Inequality Database

equally. Grooves mark deciles. <b>The dark horizontal stripe</b> sits at the height of the
<i>mean</i>: the material poking above the stripe exactly fills the air below it – plane
off the peaks into the valleys and the strip becomes flat at stripe level. Note how far
above the median (p50) the mean lies, and how large a share of the population earns below
average. <b>The white vertical mark</b> splits the <i>total income</i> into two equal

<p>In the 3D print the height scale is fixed (e.g. 1 mm = 5,000 USD, engraved underneath),

      wealth: `<h2>What the model shows</h2>

      carbon: `<h2>What the model shows</h2>
<p>Each bar is the average <b>greenhouse-gas footprint per person</b> (tonnes CO₂e/yr) in
one percentile, sorted from lowest to highest footprint. The data are Lucas Chancel's
distributions (WID), combining national accounts, environmental input-output tables and
wealth data. The footprint is <b>consumption-based</b> (includes emissions embedded in
imports, excludes exports) and has three components:</p>
<p><b>1. Private consumption</b> – allocated by income with a country-specific elasticity.<br>
<b>2. Public consumption</b> – split equally per person (lump-sum) in the benchmark;

<b>3. Investments</b> – emissions from capital formation (all gross capital formation,
i.e. <i>both private and public</i> investments – the same boundary as e.g. the Swedish
EPA's consumption statistics), attributed in proportion to <i>wealth</i>: owning x% of

<p>The dark horizontal stripe sits at the mean footprint; the white vertical mark splits
total emissions into two equal halves – half the country's consumption emissions come from
the population to the right of the mark. WID itself rates the data quality of these
distributions as low – read the top as an order of magnitude rather than an exact value.
In the 3D print the scale is fixed (1 mm = 1 tonne CO₂e/yr).</p>`,
    },
    sources: {
      income: [
        ["https://wid.world/", "World Inequality Database (WID.world)"],
        ["https://wid.world/methodology/", "WID – methodology (DINA)"],
        ["https://wir2022.wid.world/", "World Inequality Report 2022"],
      ],
      wealth: [
        ["https://wid.world/", "World Inequality Database (WID.world)"],
        ["https://wid.world/methodology/", "WID – methodology (DINA)"],
        ["https://wir2022.wid.world/chapter-3/", "World Inequality Report 2022 – wealth chapter"],
      ],
      carbon: [
        ["https://www.nature.com/articles/s41893-022-00955-z", "Chancel (2022), “Global carbon inequality over 1990–2019”, Nature Sustainability"],
        ["https://wid.world/www-site/uploads/2021/10/Chancel2022GlobalCarbon-main.pdf", "Chancel – working paper with full methodology"],
        ["https://wid.world/news-article/global-inequalities-in-ownership-based-carbon-footprints-over-2010-2022/", "Chancel & Rehm – ownership-based footprints 2010–2022"],
        ["https://www.oxfamfrance.org/app/uploads/2023/11/Methodology-Note_Climate-Equality_en-anglais.pdf", "Oxfam (2023) – methodology note, Climate Equality"],
        ["https://www.sei.org/features/qa-income-inequality-emissions-inequality/", "SEI – Q&A on emissions inequality"],
      ],
    },
  },
};

const $ = (id) => document.getElementById(id);

function fmtMoney(v, lang) {
  const loc = lang === "sv" ? "sv-SE" : "en-US";
  if (Math.abs(v) >= 1e6) return (v / 1e6).toLocaleString(loc, { maximumFractionDigits: 2 }) + " M USD";
  return Math.round(v).toLocaleString(loc) + " USD";
}
function fmtVal(v, measure, lang) {
  if (measure === "carbon") return v.toLocaleString(lang === "sv" ? "sv-SE" : "en-US", { maximumFractionDigits: 1 }) + " t";
  return fmtMoney(v, lang);
}

// Gini ur percentilklasser (Lorenz-trapetser), negativa golvas på 0
function gini(brackets) {
  const rows = brackets.map((b) => ({ w: (b.p1 - b.p0) / 100, v: Math.max(0, b.v) }));
  const total = rows.reduce((s, r) => s + r.v * r.w, 0);
  if (total <= 0) return null;
  let cum = 0, area = 0;
  for (const r of rows) {
    const l0 = cum / total;
    cum += r.v * r.w;
    const l1 = cum / total;
    area += ((l0 + l1) / 2) * r.w;
  }
  return 1 - 2 * area;
}

async function render() {
  const tr = T[LANG];
  document.documentElement.lang = LANG;
  $("langBtn").textContent = tr.langBtn;
  $("appLink").textContent = tr.appLink;
  $("appLink").href = "./?lang=" + LANG;
  $("srcH").textContent = tr.srcH;
  $("sources").innerHTML = tr.sources[M].map(([u, l]) => `<li><a href="${u}">${l}</a></li>`).join("");
  $("method").innerHTML = tr.method[M];
  const faqItems = (tr.faq && tr.faq[M]) || [];
  if (faqItems.length) {
    $("faqH").textContent = tr.faqH;
    $("faq").innerHTML = faqItems.map(([q, a]) =>
      `<details><summary>${q}</summary><div>${a}</div></details>`).join("");
    $("faqCard").style.display = "block";
  } else {
    $("faqCard").style.display = "none";
  }
  document.title = tr.title[M] + " – Inequality in 3D";

  let idx, cd;
  try {
    idx = await (await fetch("data/index.json")).json();
    cd = await (await fetch(`data/wid_${CODE}.json`)).json();
  } catch {
    $("err").textContent = LANG === "sv" ? `Hittar ingen data för landskoden ${CODE}.` : `No data found for country code ${CODE}.`;
    $("title").textContent = tr.title[M];
    return;
  }
  const cName = LANG === "sv" ? cd.nameSv : cd.nameEn;
  $("title").textContent = `${tr.title[M]}: ${cName}`;

  const m = cd.measures[M];
  if (!m) { $("err").textContent = "…"; return; }
  const year = m.years[m.years.length - 1];
  $("subtitle").textContent = tr.subtitle(cName, year);

  const yi = m.years.indexOf(year);
  const ppp = M === "carbon" ? 1 : cd.xrates.pppUsd.lcuPer;
  const brackets = [];
  idx.brackets.forEach(([p0, p1], i) => {
    const v = m.values[i]?.[yi];
    if (v != null) brackets.push({ p0, p1, v: v / ppp });
  });
  const w = (b) => (b.p1 - b.p0);
  const tw = brackets.reduce((s, b) => s + w(b), 0);
  const mean = brackets.reduce((s, b) => s + b.v * w(b), 0) / tw;
  const at = (p) => brackets.find((b) => b.p0 <= p && b.p1 > p)?.v;
  const shareAbove = (p) => brackets.filter((b) => b.p0 >= p).reduce((s, b) => s + Math.max(0, b.v) * w(b), 0) /
    brackets.reduce((s, b) => s + Math.max(0, b.v) * w(b), 0);
  const g = gini(brackets);

  const idxC = (idx.countries || []).find((x) => x.code === CODE);
  const rows = [
    [tr.rows.median, fmtVal(at(50) ?? 0, M, LANG)],
    [tr.rows.mean, fmtVal(mean, M, LANG)],
    [tr.rows.p90, fmtVal(at(90) ?? 0, M, LANG)],
    [tr.rows.p99, fmtVal(at(99.5) ?? 0, M, LANG)],
    [tr.rows.top10, (shareAbove(90) * 100).toFixed(1) + " %"],
    [tr.rows.top1, (shareAbove(99) * 100).toFixed(1) + " %"],
    [tr.rows.gini, g != null ? g.toFixed(2) : "–"],
    ...(idxC && idxC.quality > 0 ? [[tr.rows.dq, String(idxC.quality)]] : []),
  ];
  $("stats").innerHTML = rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("");
  $("statsH").textContent = tr.statsH(year);
  $("statsNote").textContent = tr.statsNote;
  $("statsCard").style.display = "block";

  if (M === "carbon" && cd.measures.carbonCons && cd.measures.carbonInv && cd.govFootprint) {
    const comp = (key) => {
      const mm = cd.measures[key];
      const yy = mm.years.includes(year) ? mm.years.indexOf(year) : mm.years.length - 1;
      let s = 0, ww = 0;
      idx.brackets.forEach(([p0, p1], i) => {
        const v = mm.values[i]?.[yy];
        if (v != null) { s += v * (p1 - p0); ww += (p1 - p0); }
      });
      return s / ww;
    };
    const gi = cd.govFootprint.years.indexOf(
      cd.govFootprint.years.includes(year) ? year : cd.govFootprint.years[cd.govFootprint.years.length - 1]);
    const gov = cd.govFootprint.values[gi];
    const consTotal = comp("carbonCons");
    const inv = comp("carbonInv");
    const rows2 = [
      [tr.compRows.gov, gov.toFixed(1)],
      [tr.compRows.cons, Math.max(0, consTotal - gov).toFixed(1)],
      [tr.compRows.inv, inv.toFixed(1)],
    ];
    $("comp").innerHTML = rows2.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("");
    $("compH").textContent = tr.compH(year);
    $("compNote").textContent = tr.compNote;
    $("compCard").style.display = "block";
  }
}

$("langBtn").addEventListener("click", () => {
  LANG = LANG === "sv" ? "en" : "sv";
  localStorage.setItem("ineq3d_lang", LANG);
  render();
});
render();
</script>
